<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00C853"/>
      <stop offset="100%" style="stop-color:#00E676"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="120" height="120" rx="24" fill="url(#bgGrad)"/>
  
  <!-- Outer ring -->
  <circle cx="60" cy="60" r="52" fill="none" stroke="#00C853" stroke-width="1.5" opacity="0.3"/>

  <!-- Chart bars -->
  <g filter="url(#glow)" transform="translate(60,65)">
    <rect x="-28" y="4" width="14" height="18" rx="3" fill="#00C853" opacity="0.4"/>
    <rect x="-11" y="-8" width="14" height="30" rx="3" fill="#00C853" opacity="0.65"/>
    <rect x="6" y="-24" width="14" height="46" rx="3" fill="url(#greenGrad)"/>
    <!-- Arrow up -->
    <polygon points="13,-28 20,-38 27,-28" fill="#00E676"/>
  </g>

  <!-- "T P P" letters at bottom -->
  <text x="60" y="108"
    font-family="'Arial Black', Arial, sans-serif"
    font-weight="900"
    font-size="11"
    fill="#00C853"
    text-anchor="middle"
    letter-spacing="4">TPP</text>
</svg>
